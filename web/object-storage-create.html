<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>创建对象存储数据源</title>
    <link rel="stylesheet" href="css/tokens.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
  </head>
  <body>
    <div class="app-shell">
      <div class="shell-body">
        <main class="page page-narrow">
          <nav class="breadcrumb"><a href="index.html">首页</a><span>/</span><a href="sources.html">Data Assets</a><span>/</span><a href="source-create.html">接入数据源</a><span>/</span><a href="file-sources.html">文件系统</a><span>/</span><span>S3 / MinIO</span></nav>
          <div class="page-header">
            <div>
              <h1 class="page-title">创建对象存储数据源</h1>
              <p class="page-subtitle">连接 S3、MinIO 或兼容对象存储，保存后系统自动盘点 Bucket / Prefix 下的对象资产元数据。</p>
            </div>
          </div>

          <div class="content-stack">
            <section class="card">
              <div class="card-header">
                <div>
                  <h2 class="card-title">基础信息</h2>
                  <p class="card-subtitle">用于识别和治理这个对象存储接入。</p>
                </div>
              </div>
              <div class="card-body">
                <div class="field-grid">
                  <label class="field">
                    <span class="label">数据源名称</span>
                    <input class="input" id="sourceName" value="合同归档 Bucket">
                  </label>
                  <label class="field">
                    <span class="label">负责人</span>
                    <input class="input" id="owner" value="法务团队">
                  </label>
                  <label class="field">
                    <span class="label">业务域</span>
                    <input class="input" id="businessDomain" value="合同管理">
                  </label>
                  <label class="field">
                    <span class="label">标签</span>
                    <input class="input" id="tags" value="合同, 归档, 对象存储">
                  </label>
                  <label class="field full">
                    <span class="label">描述</span>
                    <textarea class="textarea" id="description">法务团队维护的合同归档文件，按业务目录保存在对象存储中。</textarea>
                  </label>
                </div>
              </div>
            </section>

            <section class="card">
              <div class="card-header">
                <div>
                  <h2 class="card-title">存储连接</h2>
                  <p class="card-subtitle">定位对象存储服务和需要接入的 Bucket。</p>
                </div>
                <span class="status blue" id="connectionStatus">未测试</span>
              </div>
              <div class="card-body">
                <div class="field-grid">
                  <label class="field">
                    <span class="label">存储类型</span>
                    <select class="select" id="storageType">
                      <option>MinIO</option>
                      <option>Amazon S3</option>
                      <option>S3 兼容</option>
                    </select>
                  </label>
                  <label class="field">
                    <span class="label">访问协议</span>
                    <select class="select" id="protocol">
                      <option>HTTPS</option>
                      <option>HTTP</option>
                    </select>
                  </label>
                  <label class="field full">
                    <span class="label">服务地址</span>
                    <input class="input" id="endpoint" value="https://minio.example.com" placeholder="https://minio.example.com">
                  </label>
                  <label class="field">
                    <span class="label">Bucket</span>
                    <input class="input" id="bucket" value="contracts-archive">
                  </label>
                  <label class="field">
                    <span class="label">Region</span>
                    <input class="input" id="region" value="cn-north-1">
                  </label>
                </div>
              </div>
            </section>

            <section class="card">
              <div class="card-header">
                <div>
                  <h2 class="card-title">访问凭证</h2>
                  <p class="card-subtitle">凭证用于读取对象元数据和构建任务所需的原始文件。</p>
                </div>
              </div>
              <div class="card-body">
                <div class="field-grid">
                  <label class="field">
                    <span class="label">凭证方式</span>
                    <select class="select" id="credentialMode">
                      <option value="accessKey">Access Key</option>
                      <option value="temporary">临时凭证</option>
                      <option value="anonymous">无需凭证</option>
                    </select>
                  </label>
                  <label class="field credential-field" data-credential-field="access">
                    <span class="label">Access Key</span>
                    <input class="input" id="accessKey" value="dslm_readonly">
                  </label>
                  <label class="field credential-field" data-credential-field="secret">
                    <span class="label">Secret Key</span>
                    <input class="input" id="secretKey" type="password" value="minio-secret-key">
                  </label>
                  <label class="field full credential-field" data-credential-field="token" hidden>
                    <span class="label">Session Token</span>
                    <textarea class="textarea" id="sessionToken" placeholder="临时凭证需要填写"></textarea>
                  </label>
                </div>
              </div>
            </section>

            <section class="card">
              <div class="card-header">
                <div>
                  <h2 class="card-title">接入范围</h2>
                  <p class="card-subtitle">限定需要盘点的对象路径，排除不进入资产列表的路径。</p>
                </div>
              </div>
              <div class="card-body">
                <div class="field-grid">
                  <label class="field full">
                    <span class="label">Prefix</span>
                    <input class="input" id="prefix" value="contracts/2026/" placeholder="例如 contracts/2026/">
                  </label>
                  <label class="field full">
                    <span class="label">排除路径规则</span>
                    <textarea class="textarea" id="excludeRules">archive/tmp/**
**/*.zip</textarea>
                  </label>
                </div>
              </div>
            </section>

            <div class="header-actions">
              <a class="button" href="file-sources.html">取消</a>
              <button class="button" id="testConnection" type="button">测试连接</button>
              <button class="button primary" id="saveStorageSource" type="button">保存</button>
            </div>
          </div>
        </main>
      </div>
    </div>
    <script src="js/common.js"></script>
    <script src="js/object-storage-create.js"></script>
  </body>
</html>
