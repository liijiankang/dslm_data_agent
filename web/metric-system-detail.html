<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>业务主题详情 · Data Metrics</title>
    <link rel="stylesheet" href="css/tokens.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
  </head>
  <body>
    <div class="app-shell">
      <div class="shell-body">
        <main class="page metric-system-detail-page">
          <nav class="breadcrumb">
            <a href="index.html">首页</a><span>/</span>
            <a href="metrics.html">Data Metrics</a><span>/</span>
            <span>业务主题详情</span>
          </nav>

          <section class="publish-result-hero metric-system-detail-hero">
            <div>
              <span class="status amber" id="detailStatus">待确认</span>
              <h1 class="page-title" id="detailTitle">交易经营</h1>
              <p class="page-subtitle" id="detailSubtitle">围绕订单成交、支付转化、退款影响和渠道贡献沉淀交易经营指标资产。</p>
            </div>
          </section>

          <div class="content-stack">
            <section class="metric-grid six metric-system-detail-kpis" aria-label="业务主题概览">
              <div class="metric"><div class="metric-label">分析方向</div><div class="metric-value" id="detailDirectionCount">5</div></div>
              <div class="metric"><div class="metric-label">主指标集</div><div class="metric-value" id="detailSetCount">5</div></div>
              <div class="metric"><div class="metric-label">输出资产</div><div class="metric-value" id="detailOutputCount">3</div></div>
              <div class="metric"><div class="metric-label">指标</div><div class="metric-value" id="detailMetricCount">60</div></div>
              <div class="metric"><div class="metric-label">维度</div><div class="metric-value" id="detailDimensionCount">14</div></div>
              <div class="metric"><div class="metric-label">计算任务</div><div class="metric-value" id="detailTaskCount">3</div></div>
            </section>

            <article class="metric-board-panel">
                <div class="metric-panel-head">
                  <h2>业务主题概览</h2>
                </div>
                <dl class="publish-detail-list metric-system-detail-list">
                  <div><dt>主题边界</dt><dd id="detailBoundary">订单、支付、退款、渠道、商品和成交趋势</dd></div>
                  <div><dt>关联主题</dt><dd id="detailRelatedThemes">营销增长、供应链履约</dd></div>
                  <div><dt>主数据模型</dt><dd id="detailMainModel">订单交易库</dd></div>
                  <div><dt>关联数据模型</dt><dd id="detailRelatedModels">支付明细库、退款明细库、商品库存库</dd></div>
                  <div><dt>创建方式</dt><dd id="detailCreateMode">按问题生成</dd></div>
                  <div><dt>负责人</dt><dd id="detailOwner">经营分析组</dd></div>
                  <div><dt>创建时间</dt><dd id="detailCreatedAt">2026-05-29 09:42</dd></div>
                  <div><dt>最近更新</dt><dd id="detailUpdatedAt">2026-05-29 13:18</dd></div>
                </dl>
            </article>

            <article class="metric-board-panel">
              <div class="metric-panel-head">
                <h2>分析方向</h2>
                <span id="detailDirectionSummary">核心方向优先展示</span>
              </div>
              <div class="analysis-direction-filter filter-bar">
                <label class="field">
                  <span class="label">搜索</span>
                  <input class="input" id="directionSearch" placeholder="分析方向、指标集、输出资产">
                </label>
                <label class="field">
                  <span class="label">优先级</span>
                  <select class="select" id="directionPriorityFilter">
                    <option value="all">全部优先级</option>
                    <option value="核心">核心</option>
                    <option value="扩展">扩展</option>
                  </select>
                </label>
                <label class="field">
                  <span class="label">状态</span>
                  <select class="select" id="directionStatusFilter">
                    <option value="all">全部状态</option>
                    <option value="待确认">待确认</option>
                    <option value="已确认">已确认</option>
                    <option value="待处理">待处理</option>
                  </select>
                </label>
                <button class="button" id="resetDirectionFilters" type="button">重置</button>
              </div>
              <div class="analysis-direction-grid" id="detailDirectionCards"></div>
              <div class="empty-state direction-empty-state" id="directionEmptyState" hidden>没有符合条件的分析方向</div>
              <div class="pagination-bar direction-pagination">
                <div class="hint" id="directionPaginationSummary"></div>
                <div class="pagination-controls" id="directionPaginationControls"></div>
              </div>
            </article>
          </div>
        </main>
      </div>
    </div>
    <script src="js/common.js"></script>
    <script src="js/mock-data-metrics.js"></script>
    <script src="js/data-metrics-api.js"></script>
    <script src="js/metric-system-detail.js"></script>
  </body>
</html>
