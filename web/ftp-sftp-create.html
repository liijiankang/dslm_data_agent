<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>创建 FTP / SFTP 数据源</title>
    <link rel="stylesheet" href="css/tokens.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
  </head>
  <body>
    <div class="app-shell">
      <div class="shell-body">
        <main class="page page-narrow">
          <nav class="breadcrumb"><a href="index.html">首页</a><span>/</span><a href="sources.html">Data Assets</a><span>/</span><a href="source-create.html">接入数据源</a><span>/</span><a href="file-sources.html">文件系统</a><span>/</span><span>FTP / SFTP</span></nav>
          <div class="page-header">
            <div>
              <h1 class="page-title">创建 FTP / SFTP 数据源</h1>
              <p class="page-subtitle">连接远程文件目录，保存后系统自动盘点根目录下的文件资产元数据。</p>
            </div>
          </div>

          <div class="content-stack">
            <section class="card">
              <div class="card-header">
                <div>
                  <h2 class="card-title">基础信息</h2>
                  <p class="card-subtitle">用于识别和治理这个远程目录接入。</p>
                </div>
              </div>
              <div class="card-body">
                <div class="field-grid">
                  <label class="field">
                    <span class="label">数据源名称</span>
                    <input class="input" id="sourceName" value="交付资料 SFTP">
                  </label>
                  <label class="field">
                    <span class="label">负责人</span>
                    <input class="input" id="owner" value="交付中心">
                  </label>
                  <label class="field">
                    <span class="label">业务域</span>
                    <input class="input" id="businessDomain" value="项目交付">
                  </label>
                  <label class="field">
                    <span class="label">标签</span>
                    <input class="input" id="tags" value="交付, 项目资料, 远程目录">
                  </label>
                  <label class="field full">
                    <span class="label">描述</span>
                    <textarea class="textarea" id="description">交付中心维护的项目文档、验收材料和客户交付物。</textarea>
                  </label>
                </div>
              </div>
            </section>

            <section class="card">
              <div class="card-header">
                <div>
                  <h2 class="card-title">连接信息</h2>
                  <p class="card-subtitle">定位远程文件服务。</p>
                </div>
                <span class="status blue" id="connectionStatus">未测试</span>
              </div>
              <div class="card-body">
                <div class="field-grid">
                  <label class="field">
                    <span class="label">协议类型</span>
                    <select class="select" id="protocolType">
                      <option value="sftp">SFTP</option>
                      <option value="ftp">FTP</option>
                    </select>
                  </label>
                  <label class="field">
                    <span class="label">端口</span>
                    <input class="input" id="port" inputmode="numeric" value="22">
                  </label>
                  <label class="field full">
                    <span class="label">主机地址</span>
                    <input class="input" id="host" value="files.example.com" placeholder="files.example.com">
                  </label>
                </div>
              </div>
            </section>

            <section class="card">
              <div class="card-header">
                <div>
                  <h2 class="card-title">访问凭证</h2>
                  <p class="card-subtitle">凭证用于读取远程目录元数据和构建任务所需的原始文件。</p>
                </div>
              </div>
              <div class="card-body">
                <div class="field-grid">
                  <label class="field">
                    <span class="label">凭证方式</span>
                    <select class="select" id="credentialMode"></select>
                  </label>
                  <label class="field credential-field" data-credential-field="username">
                    <span class="label">用户名</span>
                    <input class="input" id="username" value="delivery_reader">
                  </label>
                  <label class="field credential-field" data-credential-field="password">
                    <span class="label">密码</span>
                    <input class="input" id="password" type="password" value="delivery-password">
                  </label>
                  <label class="field full credential-field" data-credential-field="sshPrivateKey" hidden>
                    <span class="label">SSH 私钥</span>
                    <textarea class="textarea" id="sshPrivateKey" placeholder="粘贴用于登录 SFTP 的私钥内容"></textarea>
                  </label>
                  <label class="field credential-field" data-credential-field="sshPassphrase" hidden>
                    <span class="label">私钥口令</span>
                    <input class="input" id="sshPassphrase" type="password" placeholder="如私钥无口令可留空">
                  </label>
                </div>
              </div>
            </section>

            <section class="card">
              <div class="card-header">
                <div>
                  <h2 class="card-title">接入范围</h2>
                  <p class="card-subtitle">限定需要盘点的远程目录，排除不进入资产列表的路径。</p>
                </div>
              </div>
              <div class="card-body">
                <div class="field-grid">
                  <label class="field full">
                    <span class="label">根目录</span>
                    <input class="input" id="rootPath" value="/delivery/projects" placeholder="/delivery/projects">
                  </label>
                  <label class="field full">
                    <span class="label">排除路径规则</span>
                    <textarea class="textarea" id="excludeRules">tmp/**
**/*.zip</textarea>
                  </label>
                </div>
              </div>
            </section>

            <section class="card" data-ftp-only hidden>
              <div class="card-header">
                <div>
                  <h2 class="card-title">高级配置</h2>
                  <p class="card-subtitle">FTP 连接的网络参数。</p>
                </div>
              </div>
              <div class="card-body">
                <div class="field-grid">
                  <label class="field">
                    <span class="label">传输模式</span>
                    <select class="select" id="transferMode">
                      <option value="passive">被动模式</option>
                      <option value="active">主动模式</option>
                    </select>
                  </label>
                </div>
              </div>
            </section>

            <div class="header-actions">
              <a class="button" href="file-sources.html">取消</a>
              <button class="button" id="testConnection" type="button">测试连接</button>
              <button class="button primary" id="saveFtpSource" type="button">保存</button>
            </div>
          </div>
        </main>
      </div>
    </div>
    <script src="js/common.js"></script>
    <script src="js/ftp-sftp-create.js"></script>
  </body>
</html>
