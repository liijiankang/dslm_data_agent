<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>构建任务详情</title>
    <link rel="stylesheet" href="css/tokens.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
  </head>
  <body>
    <div class="app-shell">
      <div class="shell-body">
        <main class="page">
          <nav class="breadcrumb"><a href="index.html">首页</a><span>/</span><a href="index.html">数据源</a><span>/</span><a href="local-upload-detail.html#tasks">销售资料上传区</a><span>/</span><span>构建任务</span></nav>
          <div class="page-header">
            <div>
              <h1 class="page-title" id="taskTitle">构建任务</h1>
              <div class="source-meta" id="taskMeta"></div>
            </div>
            <div class="header-actions" id="taskActions"></div>
          </div>
          <div class="content-stack">
            <section class="metric-grid task-metrics" id="taskMetricGrid"></section>
            <section class="card pipeline-card">
              <div class="card-header">
                <div>
                  <h2 class="card-title">任务运行状态</h2>
                  <p class="card-subtitle">按执行阶段聚合展示资产处理进度，支持同时看到已完成、运行中、未开始和失败数量。</p>
                </div>
              </div>
              <div class="card-body">
                <div class="task-stage-rail" id="taskStageRail"></div>
              </div>
            </section>
            <section class="card">
              <div class="card-header">
                <div>
                  <h2 class="card-title">解析资产</h2>
                  <p class="card-subtitle">查看任务内每个资产的解析状态、当前阶段和产物数量。</p>
                </div>
              </div>
              <div class="card-body">
                <div class="filter-bar">
                  <label class="field"><span class="label">搜索资产</span><input class="input" id="taskAssetSearch" placeholder="资产名称、阶段、状态"></label>
                  <label class="field"><span class="label">文件类型</span><select class="select" id="taskAssetTypeFilter"><option value="all">全部类型</option></select></label>
                  <label class="field"><span class="label">解析状态</span><select class="select" id="taskAssetStatusFilter"><option value="all">全部状态</option></select></label>
                  <label class="field"><span class="label">当前阶段</span><select class="select" id="taskAssetStageFilter"><option value="all">全部阶段</option></select></label>
                  <button class="button" id="resetTaskAssetFilters" type="button">重置</button>
                </div>
              </div>
              <div class="table-wrap">
                <table class="table">
                  <thead><tr><th>资产</th><th>类型</th><th>解析状态</th><th>当前阶段</th><th>阶段进度</th><th>切片数</th><th>向量数</th><th>耗时</th><th>最近更新</th><th>操作</th></tr></thead>
                  <tbody id="taskAssetRows"></tbody>
                </table>
              </div>
              <div class="pagination-bar">
                <div class="hint" id="taskAssetListSummary"></div>
                <div class="pagination-controls" id="taskAssetPaginationControls"></div>
              </div>
            </section>
          </div>
        </main>
      </div>
    </div>
    <div class="modal-backdrop" id="taskRuntimeModal">
      <div class="modal">
        <div class="modal-header"><h2 class="modal-title" id="taskRuntimeTitle">构建任务操作</h2><button class="button ghost" data-close-modal>关闭</button></div>
        <div class="card-body">
          <p class="card-subtitle" id="taskRuntimeSummary"></p>
          <ul class="impact-list" id="taskRuntimeImpact"></ul>
          <p class="hint" id="taskRuntimeHint"></p>
        </div>
        <div class="modal-footer"><button class="button" data-close-modal>取消</button><button class="button primary" id="confirmTaskRuntimeAction" type="button">确认</button></div>
      </div>
    </div>
    <script src="js/mock-data.js"></script>
    <script src="js/common.js"></script>
    <script src="js/task-detail.js"></script>
  </body>
</html>
